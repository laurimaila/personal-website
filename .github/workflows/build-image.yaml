name: Build image
run-name: Build image - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main, dev]
    tags: ['v*.*.*']

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  lint-test:
    uses: ./.github/workflows/lint-test.yaml
  test-e2e:
    uses: ./.github/workflows/test-e2e.yaml

  build:
    needs: [lint-test, test-e2e]
    runs-on: [self-hosted, linux, ARM64]
    environment: ${{ (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,priority=300,prefix=,enable=${{ !startsWith(github.ref, 'refs/tags/') && github.ref == 'refs/heads/main' }}
            type=sha,priority=300,prefix=,suffix=-dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,priority=100,value=${{ vars.TAG }},enable=${{ vars.TAG != '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
          BUILDKIT_PROGRESS: plain
        with:
          context: .
          push: true
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Clean up old package versions
        uses: actions/delete-package-versions@v5
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: 'container'
          min-versions-to-keep: 30
          delete-only-untagged-versions: false
