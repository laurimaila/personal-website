services:
  backend:
    image: ghcr.io/laurimaila/backend-personal-website:latest
    ports:
      - '3000:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - CORS_ORIGINS=http://localhost:3001,http://127.0.0.1:3001
      - POSTGRES_HOST=db
      - POSTGRES_DB=e2e-pg-db
      - POSTGRES_USER=e2e-pg-user
      - POSTGRES_PASSWORD=e2e-pg-password
      - CONNECTION_STRING=Host=db;Database=e2e-pg-db;Username=e2e-pg-user;Password=e2e-pg-password
      - PHYSICS_SVC_URL=http://physics-svc:50051
      - JWT_SECRET_KEY=uq9MU4Jng5HpHPu3L3VpL0cYfeAYCmzWeYh2vn1Qxmi
      - JWT_EXPIRY_HOURS=24
    depends_on:
      db:
        condition: service_healthy
      migration-svc:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/api/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  physics-svc:
    image: ghcr.io/laurimaila/physics-svc:latest

  migration-svc:
    image: ghcr.io/laurimaila/liquibase-svc:latest
    environment:
      - JDBC_URL=jdbc:postgresql://db:5432/e2e-pg-db
      - POSTGRES_PASSWORD=e2e-pg-password
      - POSTGRES_USER=e2e-pg-user
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    volumes: # Store data in a named docker volume
      - personal-website-data-e2e:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=e2e-pg-password
      - POSTGRES_USER=e2e-pg-user
      - POSTGRES_DB=e2e-pg-db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U e2e-pg-user -d e2e-pg-db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  personal-website-data-e2e:
